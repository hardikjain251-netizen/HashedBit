<!DOCTYPE html>
<html>

<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AlphaBeta Assignment - Dynamic - CSS</title>

  <style>
    .text-here {
    font-size: 55px;
    font-family: sans-serif;
    color: black;
    text-decoration: none;
    font-style: normal;
    font-weight: normal;
    line-height: normal;
    text-align: left;
    letter-spacing: normal;
    word-spacing: normal;
}
  </style>

  
</head>
<body>
  <div class='text-here' id='text-container'>This is some example text</div>


<input type="text" id="colorbox">

<button id="colorchange">Change Colour</button>

<br><br>

<input type="range" id="fontsize" min="10" max="100" value="55">
<br><br>


<button id="italic" class="stylebt">Italics</button>
<button id="underline" class="stylebt">Underline</button>
<button id="bold" class="stylebt">Bold</button>

<br><br>


<select id="list">
        <option value="serif">Serif</option>
        <option value="sans-serif">Sans-Serif</option>
        <option value="monospace">Monospace</option>
        <option value="cursive">Cursive</option>
        <option value="fantasy">Fantasy</option>
    </select>


<br><br>

<button id="getstyle">Get CSS</button>

<br><br>
<p id="css-props"></p>



  <script>
    const textContainer = document.getElementById("text-container");
const colorBox = document.getElementById("colorbox");
const colorChangeBtn = document.getElementById("colorchange");
const fontSizeSlider = document.getElementById("fontsize");
const italicBtn = document.getElementById("italic");
const underlineBtn = document.getElementById("underline");
const boldBtn = document.getElementById("bold");
const fontList = document.getElementById("list");
const getStyleBtn = document.getElementById("getstyle");
const cssPropsParagraph = document.getElementById("css-props");

let currentColorName = null;
let currentFontFamily = null;
let isBold = false;
let isItalic = false;
let isUnderline = false;
 
textContainer.style.fontSize = fontSizeSlider.value + "px";
 
colorChangeBtn.addEventListener("click", () => {
  const typedColor = colorBox.value.trim();
 
  if (typedColor === "") return; // ignore empty input
 
  textContainer.style.color = typedColor;

  currentColorName = typedColor;
});
 
fontSizeSlider.addEventListener("input", () => {
  textContainer.style.fontSize = fontSizeSlider.value + "px";
});

boldBtn.addEventListener("click", () => {
  isBold = !isBold; // flip true/false
  textContainer.style.fontWeight = isBold ? "bold" : "normal";
});
 
italicBtn.addEventListener("click", () => {
  isItalic = !isItalic;
  textContainer.style.fontStyle = isItalic ? "italic" : "normal";
});
 
underlineBtn.addEventListener("click", () => {
  isUnderline = !isUnderline;
  textContainer.style.textDecoration = isUnderline ? "underline" : "none";
});

fontList.addEventListener("change", () => {
  const chosenFont = fontList.value; // e.g. "serif", "cursive"
  textContainer.style.fontFamily = chosenFont;
  currentFontFamily = chosenFont;
});

getStyleBtn.addEventListener("click", () => {
  const properties = [];
 
  if (currentColorName) {
    properties.push(`color: ${currentColorName};`);
  }

  properties.push(`font-size: ${fontSizeSlider.value}px;`);
 
  if (currentFontFamily) {
    properties.push(`font-family: ${currentFontFamily};`);
  }
 
  if (isBold) {
    properties.push("font-weight: bold;");
  }
 
  if (isItalic) {
    properties.push("font-style: italic;");
  }
 
  if (isUnderline) {
    properties.push("text-decoration: underline;");
  }

  cssPropsParagraph.textContent = properties.join(" ");
});
 

  </script>
</body>
</html>
